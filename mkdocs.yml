site_name: Web3 Agent Kit
site_description: Open-source framework for building autonomous AI agents that interact with blockchain networks.
site_url: https://ulsreall.github.io/web3-agent-kit/
repo_url: https://github.com/ulsreall/web3-agent-kit
repo_name: ulsreall/web3-agent-kit
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - announce.dismiss
  icon:
    repo: fontawesome/brands/github
    logo: fontawesome/solid/robot
  favicon: assets/favicon.png

plugins:
  - search

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ulsreall/web3-agent-kit
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/itseywacc
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/web3-agent-kit/
  generator: false

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI Tool: cli.md
  - Features: features.md
  - Examples: examples.md
  - API Reference:
    - api/agent.md
    - api/wallet.md
    - api/chain.md
    - api/llm.md
    - api/sniper.md
    - api/portfolio.md
    - api/bridge.md
    - api/defi.md
    - api/airdrop.md
    - api/security.md
    - api/mev.md
    - api/nft.md
    - api/trading.md
  - New Modules:
    - api/oracle.md
    - api/events.md
    - api/simulator.md
    - api/account_abstraction.md
    - api/messaging.md
    - api/governance.md
  - Contributing: contributing.md
  - Changelog: changelog.md
