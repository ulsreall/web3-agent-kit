name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-timeout httpx pytest-asyncio solders base58 solana


    - name: Import smoke test
      run: |
        pip install -e .
        python - <<'PY'
        import web3_agent_kit
        from web3_agent_kit import Agent, Wallet, Chain
        assert web3_agent_kit.__version__
        print("import ok", web3_agent_kit.__version__)
        PY

    - name: Run tests
      timeout-minutes: 5
      run: |
        pytest tests/ -v --cov=web3_agent_kit --cov-report=xml --timeout=30 -x

    - name: Upload coverage
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
      with:
        file: ./coverage.xml
